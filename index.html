<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OffCampus Phodenge</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#111; color:white; padding:12px; text-align:center; font-size:20px;}
.controls {padding:10px; background:white; position:sticky; top:0; z-index:10;}
input, select {padding:8px; margin:5px; width:100%; max-width:200px;}
table {width:100%; border-collapse:collapse; background:white; overflow-x: auto;}
th, td {padding:8px; border:1px solid #ddd; font-size:14px; vertical-align:top;}
th {background:#222; color:white;}
a {color:blue; font-weight:bold; text-decoration:underline;}
@media (max-width:600px){ th, td{font-size:12px; padding:6px;} }
</style>
</head>
<body>

<header>OffCampus Phodenge (Aman Chowdhury)</header>

<div class="controls">
<input type="text" id="search" placeholder="Search company / role">
<select id="expFilter">
<option value="">All Experience</option>
<option>0</option>
<option>0-1</option>
<option>1-3</option>
<option>Intern</option>
</select>
<select id="typeFilter">
<option value="">All Type</option>
<option>Intern</option>
<option>Fulltime</option>
<option>Offcampus</option>
</select>
</div>

<table id="table"></table>

<script>
// ✅ Use your AllOrigins + Public sheet link
const url = "https://docs.google.com/spreadsheets/d/1NPbo0DKDRRLVlahvahKweP4pHmEtntY7hCingz3Z78U/gviz/tq?tqx=out:csv&sheet=Public";

let allRows = [];

// CSV parser handles quotes, commas, and line breaks
function parseCSV(text) {
  const rows = [];
  let cur = '';
  let row = [];
  let insideQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];
    if(char === '"') {
      if(text[i+1] === '"'){
        cur += '"';
        i++;
      } else {
        insideQuotes = !insideQuotes;
      }
    }
    else if(char === ',' && !insideQuotes) {
      row.push(cur);
      cur='';
    }
    else if((char === '\n' || char === '\r') && !insideQuotes){
      if(cur || row.length>0){
        row.push(cur);
        rows.push(row);
        row=[];
        cur='';
      }
    } 
    else {
      cur += char;
    }
  }
  if(cur || row.length>0){
    row.push(cur);
    rows.push(row);
  }
  return rows.map(r=>r.map(c=>c.trim()));
}

// Format date nicely
function formatDate(str){
  if(!str) return "";
  let d = new Date(str);
  if(isNaN(d)) return str;
  const options = { day: "numeric", month: "long", year: "numeric" };
  return d.toLocaleDateString("en-GB", options);
}

// Render table
function render(rows){
  let html = "";
  rows.forEach((row,i)=>{
    html += "<tr>";
    row.forEach((c,j)=>{
      if(i==0){
        html += "<th>"+c+"</th>";
      }
      else if(j==0){
        html += "<td>"+formatDate(c)+"</td>";
      }
      else if(j==4){ // ✅ Apply link column
        const link = c.trim();
        html += "<td><a href='"+link+"' target='_blank'>Link to Apply</a></td>";
      }
      else{
        html += "<td>"+c+"</td>";
      }
    });
    html += "</tr>";
  });
  document.getElementById("table").innerHTML = html;
}

// Filter function
function filter(){
  const text = document.getElementById("search").value.toLowerCase();
  const exp = document.getElementById("expFilter").value;
  const type = document.getElementById("typeFilter").value;

  const filtered = allRows.filter((row,i)=>{
    if(i==0) return true;
    let ok = true;
    if(text && !row.join(" ").toLowerCase().includes(text)) ok=false;
    if(exp && row[3] != exp) ok=false;
    if(type && row[7] != type) ok=false;
    return ok;
  });

  render(filtered);
}

// Fetch CSV and render
fetch(url)
.then(r=>r.text())
.then(data=>{
  allRows = parseCSV(data);
  render(allRows);
});

// Event listeners
document.getElementById("search").oninput = filter;
document.getElementById("expFilter").onchange = filter;
document.getElementById("typeFilter").onchange = filter;
</script>

</body>
</html>
