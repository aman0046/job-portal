        .footer a {

        .footer a:hover {

        }

        .topBanner {

            background: linear-gradient(135deg, #1f4037, #2c7744);

            color: white;

            padding: 25px 15px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-wrap: wrap;

        }


        .bannerLeft {

        }


        .title {

            font-weight: bold;

        .subtitle {

        .bannerRight {

        .btn {

            border-radius: 6px;

            text-decoration: none;

            font-size: 13px;

            font-weight: bold;

            color: white;

        .wa {

        }

        .tg {
            background: #0088cc;
        }

        .li {
            background: #0077b5;
        }


        .btn:hover {
            opacity: 0.85;
        }


        @media(max-width:700px) {

            .topBanner {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .bannerLeft {
                max-width: 100%;
            }

        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:nth-child(odd) {
            background: #ffffff;
        }

        .newBadge {
            position: absolute;
            right: 10px;
            top: 11px;

            background: linear-gradient(45deg, #ff9800, #ff3d00);
            color: white;

            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;

            font-weight: bold;

            animation: pulseBadge 1.5s infinite;
            box-shadow: 0 0 6px rgba(255, 100, 0, 0.7);
        }

        @keyframes pulseBadge {

            0% {
                transform: scale(1);
            }

            50% {

            }

            100% {
                transform: scale(1);
            }

        .companyCell {

            padding-right: 50px;
        }


        /* eligibility colors */

        .badge {

            border-radius: 8px;
            font-size: 12px;

            display: inline-block;
        }

        .intern {

        }

        .fresher {

        }

        .y1 {

        }

        .y2 {
            background: #795548;
        }

        .y3 {
            background: #ff9800;
        }

        @media (max-width:600px) {

            th,
            td {
                font-size: 12px;
                padding: 6px;
            }
        }

        /* Pagination CSS */
        .pagination {
            padding: 12px;
            text-align: center;
            background: white;
        }

        .pageBtn {

            border: 1px solid #ccc;
            padding: 6px 10px;
            margin: 3px;
            border-radius: 6px;
            cursor: pointer;
            background: #f5f5f5;
        }

        .pageBtn:hover {

        }

        .pageActive {

            background: #4c6ef5;
            color: white;
            border: none;

        }
        .navbar a.active {
            background: #333;
        }
    </style>

<body>

            <div class="subtitle">

                Loading users...

    <div class="controls">

        <input type="text" id="search" placeholder="Search company / role">

        <select id="expFilter">
            <option value="">All Experience</option>
            <option>Intern</option>
            <option>Fresher's</option>
            <option>1+ Years</option>
            <option>2+ Years</option>
            <option>3+ Years</option>
        </select>

    </div>


    <div class="tableWrap">
        <table id="table"></table>
    </div>

    <div id="pagination" class="pagination"></div>



    <script>

        const url =
            "https://docs.google.com/spreadsheets/d/1NPbo0DKDRRLVlahvahKweP4pHmEtntY7hCingz3Z78U/gviz/tq?tqx=out:csv&sheet=Public";

        let allRows = [];

        let currentPage = 1;
        const rowsPerPage = 15;
        let filteredRows = [];


        // CSV parser
        function parseCSV(text) {

            const rows = [];
            let cur = '';
            let row = [];
            let insideQuotes = false;

            for (let i = 0; i < text.length; i++) {

                const char = text[i];

                if (char === '"') {

                    if (text[i + 1] === '"') {
                        cur += '"';
                        i++;
                    }
                    else {
                        insideQuotes = !insideQuotes;
                    }

                }

                else if (char === ',' && !insideQuotes) {
                    row.push(cur);
                    cur = '';
                }

                else if ((char === '\n' || char === '\r') && !insideQuotes) {

                    if (cur || row.length > 0) {

                        row.push(cur);
                        rows.push(row);

                        row = [];
                        cur = '';

                    }

                }

                else {
                    cur += char;
                }

            }

            if (cur || row.length > 0) {
                row.push(cur);
                rows.push(row);
            }

            return rows.map(r => r.map(c => c.trim()));

        }



        // date format
        function formatDate(str) {

            if (!str) return "";

            let d = new Date(str);

            if (isNaN(d)) return str;

            const options = {
                day: "numeric",
                month: "long",
                year: "numeric"
            };

            return d.toLocaleDateString("en-GB", options);

        }



        // render table
        function render(rows) {

            filteredRows = rows;

            const start = (currentPage - 1) * rowsPerPage + 1;
            const end = start + rowsPerPage;

            const header = rows[0];
            const body = rows.slice(1);

            const pageRows = body.slice(start - 1, end - 1);

            let html = "";

            // header
            html += "<tr>";
            header.forEach(h => {
                html += "<th>" + h + "</th>";
            });
            html += "</tr>";

            // rows
            pageRows.forEach(row => {

                html += "<tr>";

                row.forEach((c, j) => {

                    if (j == 0) {
                        html += "<td>" + formatDate(c) + "</td>";
                    }

                    else if (j == 1) {

                        let badge = "";

                        if (isToday(row[0])) {
                            badge = " <span class='newBadge'>NEW</span>";
                        }

                        html +=
                            "<td class='companyCell'>" + c + badge + "</td>";
                    }

                    else if (j == 3) {

                        let cls = "badge";

                        if (c.includes("Intern")) cls += " intern";
                        else if (c.includes("Fresher")) cls += " fresher";
                        else if (c.includes("1+")) cls += " y1";
                        else if (c.includes("2+")) cls += " y2";
                        else if (c.includes("3+")) cls += " y3";

                        html +=
                            "<td><span class='" + cls + "'>" + c + "</span></td>";
                    }

                    else if (j == 4) {

                        html +=
                            "<td><a href='" + c +
                            "' target='_blank'>Link to Apply</a></td>";
                    }

                    else {
                        html += "<td>" + c + "</td>";
                    }

                });

                html += "</tr>";

            });

            document.getElementById("table").innerHTML = html;

            renderPagination();

        }

        function renderPagination() {

            const totalPages =
                Math.ceil((filteredRows.length - 1) / rowsPerPage);

            let html = "";

            const maxShow = 5; // change if needed


            // prev button
            html +=
                `<span class="pageBtn" onclick="prevPage()">◀</span>`;


            // ---- calculate window ----

            let half = Math.floor(maxShow / 2);

            let start =
                currentPage - half;

            let end =
                currentPage + half;


            if (start < 1) {

                start = 1;
                end = maxShow;

            }

            if (end > totalPages) {

                end = totalPages;
                start = totalPages - maxShow + 1;

            }

            if (start < 1) start = 1;


            // ---- first page ----

            if (start > 1) {

                html +=
                    `<span class="pageBtn" onclick="goPage(1)">1</span>`;

                if (start > 2) {
                    html += `<span class="pageBtn">...</span>`;
                }
            }


            // ---- middle pages ----

            for (let i = start; i <= end; i++) {

                let cls = "pageBtn";

                if (i === currentPage) {
                    cls += " pageActive";
                }

                html +=
                    `<span class="${cls}" onclick="goPage(${i})">${i}</span>`;
            }


            // ---- last page ----

            if (end < totalPages) {

                if (end < totalPages - 1) {
                    html += `<span class="pageBtn">...</span>`;
                }

                html +=
                    `<span class="pageBtn" onclick="goPage(${totalPages})">${totalPages}</span>`;
            }


            // next button
            html +=
                `<span class="pageBtn" onclick="nextPage()">▶</span>`;


            document.getElementById("pagination").innerHTML = html;
        }

        function goPage(p) {

            currentPage = p;
            render(filteredRows);

        }


        function nextPage() {

            const total =
                Math.ceil((filteredRows.length - 1) / rowsPerPage);

            if (currentPage < total) {

                currentPage++;
                render(filteredRows);

            }
        }


        function prevPage() {

            if (currentPage > 1) {

                currentPage--;
                render(filteredRows);

            }
        }



        // filter
        function filter() {

            const text =
                document.getElementById("search").value.toLowerCase();

            const exp =
                document.getElementById("expFilter").value;

            const filtered =
                allRows.filter((row, i) => {

                    if (i == 0) return true;

                    let ok = true;

                    if (text &&
                        !row.join(" ").toLowerCase().includes(text))
                        ok = false;

                    if (exp && row[3] != exp)
                        ok = false;

                    return ok;

                });

            currentPage = 1;

            render(filtered);

        }

        function isToday(dateStr) {

            if (!dateStr) return false;

            let d = new Date(dateStr);
            let t = new Date();

            return (
                d.getDate() === t.getDate() &&
                d.getMonth() === t.getMonth() &&
                d.getFullYear() === t.getFullYear()
            );

        }



        // fetch data
        fetch(url)

            .then(r => r.text())

            .then(data => {

                allRows = parseCSV(data);


                // reverse order (latest first)
                const header = allRows[0];
                const body = allRows.slice(1).reverse();

                allRows = [header, ...body];

                render(allRows);

            });



        document.getElementById("search").oninput = filter;
        document.getElementById("expFilter").onchange = filter;
    </script>
