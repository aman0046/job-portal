<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Software Jobs Portal</title>

<style>

body {
font-family: Arial;
margin: 0;
background: #f5f5f5;
}

header {
background: #111;
color: white;
padding: 12px;
text-align: center;
font-size: 20px;
}

.controls {
padding: 10px;
background: white;
position: sticky;
top: 0;
z-index: 10;
}

input, select {
padding: 8px;
margin: 5px;
width: 100%;
max-width: 200px;
}

table {
width: 100%;
border-collapse: collapse;
background: white;
}

th, td {
padding: 8px;
border: 1px solid #ddd;
font-size: 14px;
}

th {
background: #222;
color: white;
}

a {
color: blue;
font-weight: bold;
}

@media (max-width:600px){

th, td {
font-size: 12px;
padding: 6px;
}

}

</style>
</head>

<body>

<header>
Software Jobs Portal
</header>

<div class="controls">

<input type="text" id="search" placeholder="Search company / role">

<select id="expFilter">
<option value="">All Experience</option>
<option>0</option>
<option>0-1</option>
<option>1-3</option>
<option>Intern</option>
</select>

<select id="typeFilter">
<option value="">All Type</option>
<option>Intern</option>
<option>Fulltime</option>
<option>Offcampus</option>
</select>

</div>

<table id="table"></table>

<script>

const url =
"https://api.allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/1NPbo0DKDRRLVlahvahKweP4pHmEtntY7hCingz3Z78U/gviz/tq?tqx=out:csv&sheet=Public";

let allRows = [];

fetch(url)
.then(r => r.text())
.then(data => {

const rows = data.trim().split("\n").map(r => r.split(","));

allRows = rows;

render(rows);

});

function render(rows){

let html = "";

rows.forEach((row,i)=>{

html += "<tr>";

row.forEach((c,j)=>{

if(i==0){
html += "<th>"+c+"</th>";
}
else if(j==6){
html += "<td><a target='_blank' href='"+c+"'>Apply</a></td>";
}
else{
html += "<td>"+c+"</td>";
}

});

html += "</tr>";

});

document.getElementById("table").innerHTML = html;

}


document.getElementById("search").oninput = filter;
document.getElementById("expFilter").onchange = filter;
document.getElementById("typeFilter").onchange = filter;


function filter(){

let text =
document.getElementById("search").value.toLowerCase();

let exp =
document.getElementById("expFilter").value;

let type =
document.getElementById("typeFilter").value;


let filtered = allRows.filter((row,i)=>{

if(i==0) return true;

let ok = true;

if(text &&
!row.join(" ").toLowerCase().includes(text))
ok=false;

if(exp && row[3] != exp)
ok=false;

if(type && row[7] != type)
ok=false;

return ok;

});

render(filtered);

}

</script>

</body>
</html>
